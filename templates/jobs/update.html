{% extends "base.html" %}
{% block title %}Edit Application - Job Application Tracker{% endblock %}

{% block content %}
  <h2 class="fw-bold mb-4">Edit Job Application</h2>
  <form method="post" novalidate>
    {% csrf_token %}
    {% include "jobs/_form_fields.html" %}
    <button type="submit" class="btn btn-primary">Update Application</button>
    <a href="{% url 'job_list' %}" class="btn btn-outline-secondary">Cancel</a>
  </form>
{% endblock %}
